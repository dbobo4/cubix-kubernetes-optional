apiVersion: v1
kind: Namespace
metadata:
  name: optional3
  labels:
    training: block3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optional
  namespace: optional3
  labels:
    app: optional
    training: block3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: optional
  template:
    metadata:
      labels:
        app: optional
        training: block3
    spec:
      containers:
        - name: optional
          image: quay.io/drsylent/cubix/block3/optional:quarkus3
          ports:
            - containerPort: 8080
          env:
            - name: FILE_LOCATION
              value: /deployments/optional.txt
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: optional
  namespace: optional3
  labels:
    app: optional
    training: block3
spec:
  selector:
    app: optional
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: optional
  namespace: optional3
  labels:
    app: optional
    training: block3
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: optional
                port:
                  number: 80
